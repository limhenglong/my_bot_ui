<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>បញ្ចូលទិន្នន័យឯកសារ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ប្រើប្រាស់ពណ៌តាម Theme របស់ Telegram (Dark/Light Mode) */
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f9);
            color: var(--tg-theme-text-color, #333);
            padding: 15px;
            margin: 0;
        }
        .container {
            background-color: var(--tg-theme-bg-color, white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h3 {
            text-align: center;
            color: var(--tg-theme-button-color, #0088cc);
            margin-top: 0;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Kantumruy Pro', sans-serif;
            font-size: 14px;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #333);
            outline: none;
        }
        input:focus, textarea:focus {
            border-color: var(--tg-theme-button-color, #0088cc);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Kantumruy Pro', sans-serif;
            margin-top: 10px;
        }
        button:active {
            opacity: 0.8;
        }
        .note {
            font-size: 12px;
            text-align: center;
            color: var(--tg-theme-hint-color, #666);
            margin-top: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h3>📝 បញ្ចូលព័ត៌មានឯកសារ</h3>
        
        <div class="form-group">
            <label>កាលបរិច្ឆេត (ថ្ងៃ-ខែ-ឆ្នាំ)</label>
            <input type="text" id="date" placeholder="ឧ. 12-03-2026">
        </div>
        
        <div class="form-group">
            <label>លេខឯកសារ</label>
            <input type="text" id="num" placeholder="ឧ. ២១/២៦">
        </div>
        
        <div class="form-group">
            <label>ឈ្មោះឯកសារ <span style="color:red">*</span></label>
            <input type="text" id="name" placeholder="ឧ. លិខិតផ្ទេរសិទ្ធិ...">
        </div>
        
        <div class="form-group">
            <label>ការពិពណ៌នា</label>
            <textarea id="desc" placeholder="ព័ត៌មានបន្ថែម..."></textarea>
        </div>
        
        <button onclick="sendDataToBot()">រក្សាទុក និងផ្ញើ File 📎</button>
        
        <p class="note">⚠️ បន្ទាប់ពីចុចប៊ូតុងខាងលើ ផ្ទាំងនេះនឹងបិទ។<br>សូមទម្លាក់ឯកសារ (PDF ឬ រូបភាព) ចូលក្នុង Bot ដើម្បីបញ្ចប់!</p>
    </div>

    <script>
        // ១. ចាប់ផ្តើមដំណើរការ Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // បើកឱ្យពេញអេក្រង់ទូរស័ព្ទ
        tg.ready();  // ប្រាប់ Telegram ថា App រួចរាល់ហើយ

        // ២. មុខងារពេលចុចប៊ូតុង
        function sendDataToBot() {
            // ទាញយកតម្លៃពីប្រអប់នីមួយៗ
            const dateVal = document.getElementById('date').value.trim();
            const numVal = document.getElementById('num').value.trim();
            const nameVal = document.getElementById('name').value.trim();
            const descVal = document.getElementById('desc').value.trim();

            // ឆែកមើលថាតើគាត់បានវាយឈ្មោះឯកសារហើយឬនៅ
            if (!nameVal) {
                // ប្រើ Popup របស់ Telegram ផ្ទាល់ (ស្អាតជាង alert ធម្មតា)
                tg.showAlert("សូមបំពេញ 'ឈ្មោះឯកសារ' ជាមុនសិន!");
                return;
            }

            // ចងក្រងទិន្នន័យជាកញ្ចប់ JSON
            const data = {
                date: dateVal,
                num: numVal,
                name: nameVal,
                desc: descVal
            };

            // ៣. បញ្ជូនទិន្នន័យទៅកាន់ Bot (មុខងារនេះនឹងបិទ Web App ដោយស្វ័យប្រវត្តិ)
            tg.sendData(JSON.stringify(data));
        }
    </script>

</body>
</html>
