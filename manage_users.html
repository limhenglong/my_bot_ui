<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>គ្រប់គ្រងអ្នកប្រើប្រាស់</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4">
    <h2 class="text-xl font-bold mb-4 text-center text-blue-400">👥 គ្រប់គ្រងអ្នកប្រើប្រាស់</h2>
    <div id="usersList" class="space-y-4"></div>
    <button onclick="saveData()" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-lg transition-all">
        💾 រក្សាទុកការផ្លាស់ប្តូរ
    </button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ទាញយកទិន្នន័យពី URL ដែល Bot បានផ្ញើមក
        const urlParams = new URLSearchParams(window.location.search);
        let users = [];
        try {
            users = JSON.parse(decodeURIComponent(urlParams.get('data') || '[]'));
        } catch(e) { console.error("Error parsing users data"); }

        const usersListDiv = document.getElementById('usersList');

        // បង្ហាញអ្នកប្រើប្រាស់
        function renderUsers() {
            usersListDiv.innerHTML = '';
            users.forEach((u, index) => {
                const isApproved = u.status === 'approved' ? 'selected' : '';
                const isPending = u.status === 'pending' ? 'selected' : '';
                const isRejected = u.status === 'rejected' ? 'selected' : '';

                const card = `
                <div class="glass-card p-4 rounded-xl">
                    <div class="flex justify-between items-center mb-3">
                        <span class="font-bold text-lg">${u.name ? '@'+u.name : 'ID: '+u.id}</span>
                        <select onchange="updateStatus(${index}, this.value)" class="bg-gray-800 text-sm rounded p-1 border border-gray-600 outline-none">
                            <option value="approved" ${isApproved}>✅ អនុញ្ញាត</option>
                            <option value="pending" ${isPending}>⏳ រង់ចាំ</option>
                            <option value="rejected" ${isRejected}>❌ បដិសេធ</option>
                        </select>
                    </div>
                    <div class="flex space-x-4 text-sm">
                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="checkbox" onchange="updatePerm(${index}, 'search', this.checked)" ${u.search ? 'checked' : ''} class="w-4 h-4 text-blue-500">
                            <span>ស្វែងរក</span>
                        </label>
                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="checkbox" onchange="updatePerm(${index}, 'report', this.checked)" ${u.report ? 'checked' : ''} class="w-4 h-4 text-green-500">
                            <span>របាយការណ៍</span>
                        </label>
                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="checkbox" onchange="updatePerm(${index}, 'input', this.checked)" ${u.input ? 'checked' : ''} class="w-4 h-4 text-purple-500">
                            <span>បញ្ចូល</span>
                        </label>
                    </div>
                </div>`;
                usersListDiv.innerHTML += card;
            });
        }

        function updateStatus(index, val) { users[index].status = val; }
        function updatePerm(index, type, val) { users[index][type] = val ? 1 : 0; }

        // ផ្ញើទិន្នន័យត្រឡប់ទៅ Bot វិញ
        function saveData() {
            tg.sendData(JSON.stringify({ action: 'update_users_miniapp', data: users }));
            tg.close();
        }

        renderUsers();
    </script>
</body>
</html>
