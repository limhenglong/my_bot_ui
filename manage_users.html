<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>គ្រប់គ្រងគណនី</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .pending-border { border-left: 4px solid #f59e0b; }
        .search-box { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); }
        .search-box:focus { border-color: #3b82f6; outline: none; }
    </style>
</head>
<body class="p-4 pb-24">
    <h2 class="text-xl font-bold mb-4 text-center text-blue-400">👥 គ្រប់គ្រងគណនី (All-in-One)</h2>
    
    <div class="mb-4">
        <input type="text" id="searchInput" onkeyup="filterUsers()" placeholder="🔍 ស្វែងរកតាមឈ្មោះ ឬ លេខ ID..." 
               class="w-full search-box text-white rounded-xl p-3 transition-colors placeholder-gray-400">
    </div>

    <div id="usersList" class="space-y-4"></div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-gray-900 bg-opacity-90 backdrop-blur-md flex space-x-2">
        <button onclick="exportReport()" class="w-1/3 bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl shadow-lg transition-all text-sm">
            📊 របាយការណ៍
        </button>
        <button onclick="saveData()" class="w-2/3 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-lg transition-all">
            💾 រក្សាទុក
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        let users = [];
        try {
            users = JSON.parse(decodeURIComponent(urlParams.get('data') || '[]'));
            // តម្រៀបអ្នកដែល Pending ឱ្យមកនៅខាងលើគេ
            users.sort((a, b) => (a.status === 'pending' ? -1 : (b.status === 'pending' ? 1 : 0)));
        } catch(e) { console.error("Error parsing users data"); }

        const usersListDiv = document.getElementById('usersList');

        // មុខងារបង្ហាញអ្នកប្រើប្រាស់ (ភ្ជាប់ជាមួយការ Search)
        function renderUsers(filterText = '') {
            usersListDiv.innerHTML = '';
            const lowerFilter = filterText.toLowerCase();

            users.forEach((u, index) => {
                // តម្រង Search (រកមើលទាំងឈ្មោះ និង ID)
                const searchString = `${u.name || ''} ${u.id}`.toLowerCase();
                if (!searchString.includes(lowerFilter)) return; // រំលងប្រសិនបើមិនត្រូវនឹងអ្វីដែលរក

                const isApproved = u.status === 'approved' ? 'selected' : '';
                const isPending = u.status === 'pending' ? 'selected' : '';
                const isRejected = u.status === 'rejected' ? 'selected' : '';
                
                const borderClass = u.status === 'pending' ? 'pending-border' : '';
                
                // រៀបចំការបង្ហាញឈ្មោះ (មានទាំង @ និង ID)
                const displayName = u.name ? `@${u.name}` : 'គ្មាន Username';

                const card = `
                <div class="glass-card p-4 rounded-xl ${borderClass}">
                    <div class="flex justify-between items-center mb-3">
                        <div class="w-2/3 truncate pr-2">
                            <span class="font-bold text-md block text-blue-200 truncate">${displayName}</span>
                            <span class="text-xs text-gray-400 block font-mono">ID: ${u.id}</span>
                            ${u.status === 'pending' ? '<span class="text-xs text-yellow-400 mt-1 inline-block bg-yellow-900 bg-opacity-30 px-2 py-0.5 rounded">🔔 សំណើថ្មី</span>' : ''}
                        </div>
                        <select onchange="updateStatus(${index}, this.value)" class="bg-gray-800 text-sm rounded p-2 border border-gray-600 outline-none w-1/3">
                            <option value="approved" ${isApproved}>✅ អនុញ្ញាត</option>
                            <option value="pending" ${isPending}>⏳ រង់ចាំ</option>
                            <option value="rejected" ${isRejected}>❌ បដិសេធ</option>
                        </select>
                    </div>
                    <div class="flex space-x-4 text-sm mt-3 pt-3 border-t border-gray-700 border-opacity-50">
                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="checkbox" onchange="updatePerm(${index}, 'search', this.checked)" ${u.search ? 'checked' : ''} class="w-4 h-4 text-blue-500 rounded focus:ring-blue-500">
                            <span class="${u.search ? 'text-blue-300' : 'text-gray-400'}">ស្វែងរក</span>
                        </label>
                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="checkbox" onchange="updatePerm(${index}, 'report', this.checked)" ${u.report ? 'checked' : ''} class="w-4 h-4 text-green-500 rounded focus:ring-green-500">
                            <span class="${u.report ? 'text-green-300' : 'text-gray-400'}">របាយការណ៍</span>
                        </label>
                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="checkbox" onchange="updatePerm(${index}, 'input', this.checked)" ${u.input ? 'checked' : ''} class="w-4 h-4 text-purple-500 rounded focus:ring-purple-500">
                            <span class="${u.input ? 'text-purple-300' : 'text-gray-400'}">បញ្ចូល</span>
                        </label>
                    </div>
                </div>`;
                usersListDiv.innerHTML += card;
            });
            
            // ប្រសិនបើស្វែងរកមិនឃើញ
            if (usersListDiv.innerHTML === '') {
                usersListDiv.innerHTML = '<div class="text-center text-gray-400 py-8">❌ រកមិនឃើញគណនីដែលត្រូវគ្នានឹងការស្វែងរកទេ!</div>';
            }
        }

        // ពេលវាយអក្សរក្នុងប្រអប់ Search
        function filterUsers() {
            const val = document.getElementById('searchInput').value;
            renderUsers(val);
        }

        function updateStatus(index, val) { users[index].status = val; }
        function updatePerm(index, type, val) { users[index][type] = val ? 1 : 0; }

        function saveData() {
            tg.sendData(JSON.stringify({ action: 'update_users_miniapp', data: users }));
            tg.close();
        }

        function exportReport() {
            tg.sendData(JSON.stringify({ action: 'export_users_report' }));
            tg.close();
        }

        // បង្ហាញលើកដំបូង
        renderUsers();
    </script>
</body>
</html>
