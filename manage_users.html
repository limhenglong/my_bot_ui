<div class="flex mb-4 bg-gray-800 rounded-xl p-1">
    <button onclick="switchTab('users')" id="btnUsers" class="w-1/2 py-2 rounded-lg bg-blue-600">Users</button>
    <button onclick="switchTab('groups')" id="btnGroups" class="w-1/2 py-2 rounded-lg">Groups</button>
</div>

<div id="groupsList" class="hidden space-y-4"></div>

<script>
    function switchTab(tab) {
        if(tab === 'users') {
            document.getElementById('usersList').classList.remove('hidden');
            document.getElementById('groupsList').classList.add('hidden');
            document.getElementById('btnUsers').classList.add('bg-blue-600');
            document.getElementById('btnGroups').classList.remove('bg-blue-600');
        } else {
            document.getElementById('usersList').classList.add('hidden');
            document.getElementById('groupsList').classList.remove('hidden');
            document.getElementById('btnGroups').classList.add('bg-blue-600');
            document.getElementById('btnUsers').classList.remove('bg-blue-600');
            renderGroups();
        }
    }

    function renderGroups() {
        // បញ្ជី Group ត្រូវបាញ់មកតាម URL ដូច Users ដែរ
        const groupsListDiv = document.getElementById('groupsList');
        groupsListDiv.innerHTML = '';
        
        groups.forEach((g) => {
            const card = `
            <div class="glass-card p-4 rounded-xl border-l-4 border-purple-500">
                <div class="flex justify-between items-center">
                    <div>
                        <span class="font-bold block text-purple-300">${g.name}</span>
                        <span class="text-xs text-gray-400 font-mono">ID: ${g.id}</span>
                    </div>
                    <button onclick="leaveGroup('${g.id}')" class="bg-red-900 text-red-200 px-3 py-1 rounded-lg text-xs border border-red-700">
                        Leave
                    </button>
                </div>
            </div>`;
            groupsListDiv.innerHTML += card;
        });
    }

    function leaveGroup(id) {
        if(confirm('តើបងពិតជាចង់ឱ្យ Bot ចាកចេញពី Group នេះមែនទេ?')) {
            tg.sendData(JSON.stringify({ action: 'leave_group_miniapp', group_id: id }));
        }
    }
</script>
